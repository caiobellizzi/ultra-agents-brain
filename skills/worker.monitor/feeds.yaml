# worker.monitor feed configuration — verified 2026-05-22
#
# Runtime: the Python CLI reads feeds.txt (one URL per line).
# This file is the human-readable config with metadata, defaults, and notes.
# Keep feeds.txt and this file in sync.
#
# To run manually:
#   python -m ultra_brain --vault vault monitor --feeds skills/worker.monitor/feeds.txt

defaults:
  poll_interval_hours: 4
  max_items_per_feed: 5
  write_target: Inbox
  auto_promote: false
  relevance_model_tier: C
  notes:
    - "Deduplicate by canonical_url first, then content_hash."
    - "ArXiv feeds are high-volume — max_items_per_feed applies strictly."
    - "Anthropic has no RSS feed; caught via HN and community signal."
    - "Reddit LocalLLaMA blocked RSS in 2023; no clean proxy available."

feeds:
  # --- Vendor blogs (primary sources) ---
  - name: OpenAI Blog
    url: https://openai.com/blog/rss.xml
    enabled: true
    topic: ai-research
    default_tags: [openai, ai, llm]
    trust_level: high

  - name: HuggingFace Blog
    url: https://huggingface.co/blog/feed.xml
    enabled: true
    topic: ai-research
    default_tags: [huggingface, models, open-source]
    trust_level: high

  - name: Google DeepMind Blog
    url: https://www.deepmind.com/blog/rss.xml
    enabled: true
    topic: ai-research
    default_tags: [deepmind, google, research]
    trust_level: high

  - name: Google AI Blog
    url: https://blog.google/technology/ai/rss/
    enabled: true
    topic: ai-research
    default_tags: [google, gemini, ai]
    trust_level: high

  # --- Researcher blogs ---
  - name: Andrej Karpathy
    url: https://karpathy.github.io/feed.xml
    enabled: true
    topic: ai-research
    default_tags: [karpathy, llm, education]
    trust_level: high
    notes: "Posts infrequently but extremely high signal."

  - name: Lilian Weng (OpenAI)
    url: https://lilianweng.github.io/index.xml
    enabled: true
    topic: ai-research
    default_tags: [lilian-weng, research, deep-dives]
    trust_level: high

  - name: Simon Willison
    url: https://simonwillison.net/atom/everything/
    enabled: true
    topic: ai-tooling
    default_tags: [simon-willison, llm-tools, practical]
    trust_level: high
    max_items_per_feed: 3
    notes: "High-volume blog — capped at 3 to avoid flooding Inbox."

  # --- Newsletters ---
  - name: Import AI (Jack Clark)
    url: https://importai.substack.com/feed
    enabled: true
    topic: ai-research
    default_tags: [import-ai, weekly, policy-safety]
    trust_level: high
    notes: "Weekly. Ex-OpenAI policy lead. High signal on safety + frontier models."

  # --- ArXiv ---
  - name: ArXiv cs.LG (Machine Learning)
    url: https://arxiv.org/rss/cs.LG
    enabled: true
    topic: ai-research
    default_tags: [arxiv, machine-learning, papers]
    trust_level: medium
    max_items_per_feed: 5

  - name: ArXiv cs.AI (Artificial Intelligence)
    url: https://arxiv.org/rss/cs.AI
    enabled: true
    topic: ai-research
    default_tags: [arxiv, ai, papers]
    trust_level: medium
    max_items_per_feed: 5

  - name: ArXiv cs.CL (Computation & Language / NLP)
    url: https://arxiv.org/rss/cs.CL
    enabled: true
    topic: ai-research
    default_tags: [arxiv, nlp, llm, papers]
    trust_level: medium
    max_items_per_feed: 5

  # --- Community ---
  - name: Hacker News
    url: https://news.ycombinator.com/rss
    enabled: true
    topic: engineering-knowledge
    default_tags: [hn, community, tooling]
    trust_level: medium
    max_items_per_feed: 10
    notes: "Front-page only. Catches Anthropic/AI announcements with no official RSS."

  # --- Pending / no clean solution ---
  # Anthropic — no RSS feed exists as of 2026-05-22
  # Reddit r/LocalLLaMA — blocked RSS for anonymous users since 2023
  # Meta AI blog — no targeted AI RSS (about.fb.com/news is too broad)
  # X/Twitter — skipped for now; revisit twikit after 2 weeks if signal is missing
  # Bluesky — polled via API (separate config, not RSS)
